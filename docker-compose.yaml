services:
  # 백엔드 API
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Backend API Server
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    container_name: vacation-api-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      # 전체 프로젝트 마운트
      - ./backend:/app
      # Firebase 인증 정보 (읽기 전용)
      - ./backend/credentials/serviceAccountKey.json:/app/credentials/serviceAccountKey.json:ro
      # node_modules는 컨테이너 내부 것 사용
      - /app/node_modules
    networks:
      - vacation-network
    stdin_open: true
    tty: true
    #command: npm run dev

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 개발용 Frontend (Vite + HMR)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  web-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vacation-web-dev
    restart: unless-stopped
    ports:
      - "3000:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"  # ← 호스트 접근 허용  
    networks:
      - vacation-network
    depends_on: # API 서버가 먼저 시작되도록 설정
      - api
    stdin_open: true
    tty: true
    profiles:
      - dev
    #command: npm run dev -- --host 0.0.0.0

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 프로덕션 테스트용 Frontend (Nginx)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  web-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.nginx.dev
    container_name: vacation-web-nginx
    restart: unless-stopped
    ports:
      - "8200:80"
    networks:
      - vacation-network
    depends_on: # API 서버가 먼저 시작되도록 설정
      - api
    profiles:
      - prod

networks:
  vacation-network:
    driver: bridge
   